<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ACRC Imóveis — Controle de Chaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2E4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ACRC Chaves">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8651A;--red-dark:#c45214;--red-muted:#fdeee5;
  --navy:#1B2E4B;--navy-dark:#142237;--navy-light:#243d61;
  --bg:#f2f2f0;--surface:#fff;--surface2:#f7f7f5;--surface3:#efefec;
  --border:#e4e4e0;--border2:#d0d0cc;
  --text:#191917;--text2:#525250;--text3:#969692;
  --green:#257a35;--green-bg:#e6f4ea;
  --amber:#8a5c08;--amber-bg:#fef3dc;
  --crimson:#a12828;--crimson-bg:#fceaea;
  --blue:#1a56a0;--blue-bg:#e8f0fb;
  --purple:#6b3fa0;--purple-bg:#f0eafa;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-lg:16px;--r-xl:22px;
  --sh:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.07);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5}

.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.15)}

/* HEADER */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding-top:env(safe-area-inset-top);flex-shrink:0;position:relative;overflow:hidden}
.header::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;background:rgba(232,101,26,.15);border-radius:50%;pointer-events:none}.header::before{content:"";position:absolute;left:-20px;bottom:-20px;width:80px;height:80px;background:rgba(232,101,26,.08);border-radius:50%;pointer-events:none}
.header-inner{padding:13px 14px;display:flex;align-items:center;gap:11px;position:relative}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.logo-box svg{width:24px;height:24px}
.header-text{flex:1;min-width:0}
.header-text h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em}
.header-text p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.hbtn{background:rgba(255,255,255,.14);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;transition:background .15s}
.hbtn:active{background:rgba(255,255,255,.25)}
.hbtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 2px 8px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-family:var(--font);font-size:10.5px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;position:relative}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-badge{position:absolute;top:5px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 4px;border-radius:20px;display:none;line-height:1.4}
.tab-badge.show{display:block}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.screen.active{display:flex}

/* SEARCH + FILTER */
.topbar{padding:11px 14px 9px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-wrap input{width:100%;padding:8px 10px 8px 33px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--red);background:#fff}
.search-wrap input::placeholder{color:var(--text3)}
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 11px;border-radius:20px;border:1px solid var(--border);font-size:11.5px;font-weight:500;cursor:pointer;color:var(--text2);background:var(--surface);transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.chip-dot{width:6px;height:6px;border-radius:50%}
.chip.active{background:var(--red);color:#fff;border-color:var(--red)}
.chip.active .chip-dot{filter:brightness(2)}

/* LIST */
.list-meta{font-size:11.5px;color:var(--text3);padding:5px 14px 3px;flex-shrink:0}
.key-list{flex:1;padding:6px 14px 80px;display:flex;flex-direction:column;gap:5px}
.key-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .12s}
.key-card:active{background:var(--surface2)}
.key-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.key-icon svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ki-disp{background:var(--green-bg)} .ki-disp svg{stroke:var(--green)}
.ki-indisp{background:var(--crimson-bg)} .ki-indisp svg{stroke:var(--crimson)}
.ki-nloc{background:var(--amber-bg)} .ki-nloc svg{stroke:var(--amber)}
.ki-livre{background:var(--surface2)} .ki-livre svg{stroke:var(--text3)}
.key-info{flex:1;min-width:0}
.key-loc{font-size:13.5px;font-weight:600;font-family:var(--mono);color:var(--text)}
.key-sub{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{font-size:10.5px;font-weight:500;padding:3px 8px;border-radius:6px;flex-shrink:0}
.b-disp{background:var(--green-bg);color:var(--green)}
.b-indisp{background:var(--crimson-bg);color:var(--crimson)}
.b-nloc{background:var(--amber-bg);color:var(--amber)}
.b-livre{background:var(--surface2);color:var(--text3)}
.chev{flex-shrink:0;width:13px;height:13px;stroke:var(--border2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MODAL SHEET */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;pointer-events:none;transition:background .25s}
.backdrop.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:94vh;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
.backdrop.open .sheet{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-header{padding:13px 14px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-header h2{font-size:15px;font-weight:600;color:var(--text)}
.sheet-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sheet-close svg{width:13px;height:13px;stroke:var(--text2);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.sheet-body{overflow-y:auto;padding:14px;flex:1;display:flex;flex-direction:column;gap:12px}
.sheet-footer{padding:11px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.btn-primary{flex:1;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:14.5px;font-weight:600;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary:active{opacity:.85}
.btn-secondary{padding:12px 16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14.5px;font-weight:500;cursor:pointer;transition:background .15s}

/* TOAST */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+72px);left:50%;transform:translateX(-50%) translateY(20px);background:#191917;color:#fff;padding:9px 16px;border-radius:20px;font-size:12.5px;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;z-index:500;white-space:nowrap;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:15px;height:15px;stroke:#4ade80;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.toast.err svg{stroke:#f87171}

/* HISTORICO CARDS */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:6px}
.ha-saida{background:var(--crimson-bg);color:var(--crimson)}
.ha-devolucao{background:var(--green-bg);color:var(--green)}
.hist-action{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:6px;margin-bottom:5px}

/* FORM FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:500;color:var(--text2)}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="logo-box">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="22,8 34,30 10,30" fill="#E8651A"/>
          <polygon points="22,14 27,26 17,26" fill="rgba(27,46,75,0.85)"/>
          <text x="22" y="40" font-family="Arial" font-weight="700" font-size="7" fill="white" text-anchor="middle" letter-spacing="1">ACRC</text>
        </svg>
      </div>
      <div class="header-text">
        <h1>Controle de Chaves</h1>
        <p>ACRC Imóveis — Blumenau / SC</p>
      </div>
      <button class="hbtn" onclick="exportCSV()" title="Exportar CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('lista',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Chaves
      <span class="tab-badge" id="bdg"></span>
    </button>
    <button class="tab" onclick="showTab('busca',this)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Busca
    </button>
    <button class="tab" onclick="showTab('historico',this)">
      <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 7.5 7.5 7.5"/></svg>
      Histórico
    </button>
    <button class="tab" onclick="showTab('gerenciar',this)">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Gerenciar
    </button>
  </div>

  <div class="screens">
    <!-- LISTA -->
    <div class="screen active" id="screen-lista">
      <div class="topbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="list-q" placeholder="Localização, código, responsável..." oninput="renderList()">
        </div>
        <div class="chips" id="chips">
          <div class="chip active" onclick="setF('todos',this)"><span class="chip-dot" style="background:var(--text3)"></span>Todos</div>
          <div class="chip" onclick="setF('DISPONÍVEL',this)"><span class="chip-dot" style="background:var(--green)"></span>Disponível</div>
          <div class="chip" onclick="setF('INDISPONÍVEL',this)"><span class="chip-dot" style="background:var(--crimson)"></span>Indisponível</div>
        </div>
      </div>
      <div class="list-meta" id="list-meta"></div>
      <div class="key-list" id="key-list"></div>
    </div>

    <!-- BUSCA (Simplificada para o exemplo) -->
    <div class="screen" id="screen-busca">
       <div class="topbar"><div class="search-wrap"><input type="search" placeholder="Busca rápida..." oninput="renderList()"></div></div>
       <div style="padding:20px; color:var(--text3); text-align:center">Utilize a aba Chaves para filtrar e buscar.</div>
    </div>

    <!-- HISTORICO -->
    <div class="screen" id="screen-historico">
       <div id="hist-list" style="padding:14px"></div>
    </div>

    <!-- GERENCIAR -->
    <div class="screen" id="screen-gerenciar">
       <div style="padding:14px">
          <div class="field">
            <label>Adicionar novas chaves (uma por linha)</label>
            <textarea id="bulk-keys" style="height:100px" placeholder="A1.1&#10;A1.2"></textarea>
            <button class="btn-primary" onclick="addBulk()" style="margin-top:10px">Adicionar</button>
          </div>
       </div>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="backdrop" id="modal-edit" onclick="if(event.target===this)closeSheet('modal-edit')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="edit-title">Editar Chave</h2>
      <button class="sheet-close" onclick="closeSheet('modal-edit')">X</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Status</label>
        <select id="edit-status">
          <option value="DISPONÍVEL">DISPONÍVEL</option>
          <option value="INDISPONÍVEL">INDISPONÍVEL</option>
          <option value="NÃO LOCALIZADA">NÃO LOCALIZADA</option>
        </select>
      </div>
      <div class="field">
        <label>Responsável</label>
        <input type="text" id="edit-resp">
      </div>
      <div class="field">
        <label>Código Imóvel</label>
        <input type="text" id="edit-codigo">
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-primary" onclick="saveEdit()">Salvar Alterações</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
// CONFIG E DADOS
const KEY = "acrc_v3";
let keys = [];
let filter = 'todos';
let currentEditIdx = null;

// INICIALIZAÇÃO
function load(){
    const stored = localStorage.getItem(KEY);
    keys = stored ? JSON.parse(stored) : [
        {loc: "A1.1", codigo: "101", status: "DISPONÍVEL", responsavel: ""},
        {loc: "B2.4", codigo: "505", status: "INDISPONÍVEL", responsavel: "João Silva"}
    ];
    renderList();
}

// NAVEGAÇÃO
function showTab(id, btn){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-'+id).classList.add('active');
    btn.classList.add('active');
}

// FILTROS
function setF(val, btn){
    filter = val;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

// RENDERIZAÇÃO
function renderList(){
    const list = document.getElementById('key-list');
    const query = document.getElementById('list-q').value.toLowerCase();
    
    const filtered = keys.filter(k => {
        const matchesQuery = k.loc.toLowerCase().includes(query) || k.responsavel.toLowerCase().includes(query);
        const matchesFilter = filter === 'todos' || k.status === filter;
        return matchesQuery && matchesFilter;
    });

    list.innerHTML = filtered.map((k, i) => `
        <div class="key-card" onclick="openEdit(${keys.indexOf(k)})">
            <div class="key-icon ki-${k.status === 'DISPONÍVEL' ? 'disp' : 'indisp'}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3-3.5 3.5z"/></svg>
            </div>
            <div class="key-info">
                <div class="key-loc">${k.loc}</div>
                <div class="key-sub">${k.codigo ? 'Imóvel: '+k.codigo : 'Sem código'} ${k.responsavel ? ' • '+k.responsavel : ''}</div>
            </div>
            <div class="badge b-${k.status === 'DISPONÍVEL' ? 'disp' : 'indisp'}">${k.status}</div>
        </div>
    `).join('');
    
    document.getElementById('list-meta').innerText = `${filtered.length} chaves encontradas`;
}

// MODAL E EDIÇÃO
function openEdit(idx){
    currentEditIdx = idx;
    const k = keys[idx];
    document.getElementById('edit-title').innerText = "Chave " + k.loc;
    document.getElementById('edit-status').value = k.status;
    document.getElementById('edit-resp').value = k.responsavel;
    document.getElementById('edit-codigo').value = k.codigo;
    document.getElementById('modal-edit').classList.add('open');
}

function closeSheet(id){
    document.getElementById(id).classList.remove('open');
}

function saveEdit(){
    keys[currentEditIdx].status = document.getElementById('edit-status').value;
    keys[currentEditIdx].responsavel = document.getElementById('edit-resp').value;
    keys[currentEditIdx].codigo = document.getElementById('edit-codigo').value;
    
    localStorage.setItem(KEY, JSON.stringify(keys));
    closeSheet('modal-edit');
    renderList();
    toast("Salvo com sucesso!");
}

// TOAST
function toast(msg){
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// GERENCIAR
function addBulk(){
    const val = document.getElementById('bulk-keys').value.trim();
    if(!val) return;
    const newLocs = val.split('\n');
    newLocs.forEach(l => {
        if(l.trim()) keys.push({loc: l.trim().toUpperCase(), codigo: "", status: "DISPONÍVEL", responsavel: ""});
    });
    localStorage.setItem(KEY, JSON.stringify(keys));
    document.getElementById('bulk-keys').value = "";
    toast("Chaves adicionadas!");
    renderList();
}

window.onload = load;
</script>
</body>
</html>
