<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ACRC Imóveis — Controle de Chaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2E4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ACRC Chaves">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* Mantendo todo o seu CSS original */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8651A;--red-dark:#c45214;--red-muted:#fdeee5;
  --navy:#1B2E4B;--navy-dark:#142237;--navy-light:#243d61;
  --bg:#f2f2f0;--surface:#fff;--surface2:#f7f7f5;--surface3:#efefec;
  --border:#e4e4e0;--border2:#d0d0cc;
  --text:#191917;--text2:#525250;--text3:#969692;
  --green:#257a35;--green-bg:#e6f4ea;
  --amber:#8a5c08;--amber-bg:#fef3dc;
  --crimson:#a12828;--crimson-bg:#fceaea;
  --blue:#1a56a0;--blue-bg:#e8f0fb;
  --purple:#6b3fa0;--purple-bg:#f0eafa;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-lg:16px;--r-xl:22px;
  --sh:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.07);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.15)}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding-top:env(safe-area-inset-top);flex-shrink:0;position:relative;overflow:hidden}
.header-inner{padding:13px 14px;display:flex;align-items:center;gap:11px;position:relative; z-index: 2;}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.header-text{flex:1;min-width:0}
.header-text h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em}
.header-text p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.hbtn{background:rgba(255,255,255,.14);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .15s}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 2px 8px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-family:var(--font);font-size:10.5px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9}
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column}
.screen.active{display:flex}
.topbar{padding:11px 14px 9px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2}
.search-wrap input{width:100%;padding:8px 10px 8px 33px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;outline:none}
.key-list{padding:6px 14px 80px;display:flex;flex-direction:column;gap:5px}
.key-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ki-disp{background:var(--green-bg)} .ki-disp svg{stroke:var(--green)}
.ki-indisp{background:var(--crimson-bg)} .ki-indisp svg{stroke:var(--crimson)}
.badge{font-size:10.5px;font-weight:500;padding:3px 8px;border-radius:6px;margin-left:auto}
.b-disp{background:var(--green-bg);color:var(--green)}
.b-indisp{background:var(--crimson-bg);color:var(--crimson)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;pointer-events:none;transition:all .3s}
.backdrop.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;transform:translateY(100%);transition:transform .3s;padding:20px}
.backdrop.open .sheet{transform:translateY(0)}
.btn-primary{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo-box">🏠</div>
      <div class="header-text">
        <h1>Controle de Chaves</h1>
        <p>ACRC Imóveis — Blumenau / SC</p>
      </div>
      <button class="hbtn" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('lista',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Chaves</button>
    <button class="tab" onclick="showTab('historico',this)"><svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/></svg>Histórico</button>
    <button class="tab" onclick="showTab('gerenciar',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Gerenciar</button>
  </div>

  <div class="screens">
    <div class="screen active" id="screen-lista">
      <div class="topbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="list-q" placeholder="Buscar chaves..." oninput="renderList()">
        </div>
      </div>
      <div class="key-list" id="key-list"></div>
    </div>

    <div class="screen" id="screen-historico">
      <div class="key-list" id="hist-body" style="padding-top:20px"></div>
    </div>

    <div class="screen" id="screen-gerenciar">
      <div style="padding:20px">
        <textarea id="new-keys-input" placeholder="Digite códigos (um por linha)" style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid var(--border)"></textarea>
        <button class="btn-primary" style="margin-top:10px" onclick="addKeys()">Adicionar Chaves</button>
      </div>
    </div>
  </div>
</div>

<div class="backdrop" id="modal-edit" onclick="if(event.target===this)closeSheet('modal-edit')">
  <div class="sheet">
    <h2 id="edit-title" style="margin-bottom:15px">Editar Chave</h2>
    <div style="display:flex; flex-direction:column; gap:10px">
      <input type="text" id="edit-resp" placeholder="Nome do Responsável" style="padding:12px; border-radius:8px; border:1px solid var(--border)">
      <select id="edit-status" style="padding:12px; border-radius:8px; border:1px solid var(--border)">
        <option value="DISPONÍVEL">DISPONÍVEL</option>
        <option value="INDISPONÍVEL">INDISPONÍVEL</option>
      </select>
      <button class="btn-primary" onclick="saveEdit()">Salvar Alterações</button>
      <button onclick="closeSheet('modal-edit')" style="background:none; border:none; color:var(--text3); cursor:pointer">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; display:none; z-index:1000"></div>

<script>
let keys = JSON.parse(localStorage.getItem('acrc_v1.6')) || [];
let hist = JSON.parse(localStorage.getItem('acrc_hist_v1.6')) || [];
let editingIdx = null;

function save() {
  localStorage.setItem('acrc_v1.6', JSON.stringify(keys));
  localStorage.setItem('acrc_hist_v1.6', JSON.stringify(hist));
  renderList();
  renderHist();
}

function showTab(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  btn.classList.add('active');
}

function renderList() {
  const q = document.getElementById('list-q').value.toLowerCase();
  const container = document.getElementById('key-list');
  container.innerHTML = '';
  keys.filter(k => k.loc.toLowerCase().includes(q)).forEach((k, i) => {
    const card = document.createElement('div');
    card.className = 'key-card';
    card.onclick = () => openEdit(keys.indexOf(k));
    card.innerHTML = `
      <div class="key-loc">${k.loc}</div>
      <div class="badge ${k.status === 'DISPONÍVEL' ? 'b-disp' : 'b-indisp'}">${k.status}</div>
    `;
    container.appendChild(card);
  });
}

function renderHist() {
  const container = document.getElementById('hist-body');
  container.innerHTML = hist.map(h => `
    <div class="key-card" style="flex-direction:column; align-items:flex-start">
      <div style="display:flex; width:100%; justify-content:space-between">
        <strong>${h.loc}</strong> <small>${h.time}</small>
      </div>
      <div style="font-size:12px; color:var(--text3)">${h.action} - ${h.resp}</div>
    </div>
  `).join('');
}

function addKeys() {
  const input = document.getElementById('new-keys-input').value.trim();
  if(!input) return;
  input.split('\n').forEach(loc => {
    if(loc.trim()) keys.push({loc: loc.trim().toUpperCase(), status: 'DISPONÍVEL', responsavel: ''});
  });
  document.getElementById('new-keys-input').value = '';
  save();
  showTab('lista', document.querySelector('.tab'));
}

function openEdit(idx) {
  editingIdx = idx;
  const k = keys[idx];
  document.getElementById('edit-title').innerText = "Chave: " + k.loc;
  document.getElementById('edit-resp').value = k.responsavel || '';
  document.getElementById('edit-status').value = k.status;
  document.getElementById('modal-edit').parentElement.classList.add('open');
}

function closeSheet() {
  document.getElementById('modal-edit').parentElement.classList.remove('open');
}

function saveEdit() {
  const k = keys[editingIdx];
  const oldStatus = k.status;
  k.responsavel = document.getElementById('edit-resp').value;
  k.status = document.getElementById('edit-status').value;
  
  if(oldStatus !== k.status) {
    hist.unshift({
      loc: k.loc,
      resp: k.responsavel,
      action: k.status === 'INDISPONÍVEL' ? 'SAÍDA' : 'RETORNO',
      time: new Date().toLocaleString()
    });
    if(k.status === 'INDISPONÍVEL') gerarPDF(k);
  }
  save();
  closeSheet();
}

function gerarPDF(k) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("ACRC IMÓVEIS - COMPROVANTE", 20, 20);
  doc.text(`Chave: ${k.loc}`, 20, 40);
  doc.text(`Responsável: ${k.responsavel}`, 20, 50);
  doc.text(`Data: ${new Date().toLocaleString()}`, 20, 60);
  doc.save(`recibo_${k.loc}.pdf`);
}

function exportCSV() {
  let csv = "Localizacao,Status,Responsavel\n";
  keys.forEach(k => csv += `${k.loc},${k.status},${k.responsavel}\n`);
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'chaves.csv';
  a.click();
}

renderList();
renderHist();
</script>
</body>
</html>
