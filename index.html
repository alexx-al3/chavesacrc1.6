<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ACRC Imóveis — Controle de Chaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- EmailJS para envio automático -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8651A;--red-dark:#c45214;--red-muted:#fdeee5;
  --navy:#1B2E4B;--navy-dark:#142237;--navy-light:#243d61;
  --bg:#f2f2f0;--surface:#fff;--surface2:#f7f7f5;--surface3:#efefec;
  --border:#e4e4e0;--border2:#d0d0cc;
  --text:#191917;--text2:#525250;--text3:#969692;
  --green:#257a35;--green-bg:#e6f4ea;
  --amber:#8a5c08;--amber-bg:#fef3dc;
  --crimson:#a12828;--crimson-bg:#fceaea;
  --blue:#1a56a0;--blue-bg:#e8f0fb;
  --purple:#6b3fa0;--purple-bg:#f0eafa;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-lg:16px;--r-xl:22px;
  --sh:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.07);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5}

.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.15)}

/* HEADER */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding-top:env(safe-area-inset-top);flex-shrink:0;position:relative;overflow:hidden}
.header-inner{padding:13px 14px;display:flex;align-items:center;gap:11px;position:relative}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-text{flex:1;min-width:0}
.header-text h1{font-size:15px;font-weight:600;color:#fff}
.header-text p{font-size:11px;color:rgba(255,255,255,.65)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 2px 8px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:10.5px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column}
.screen.active{display:flex}

/* SEARCH + LIST */
.topbar{padding:11px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 33px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;outline:none}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;stroke:var(--text3);fill:none;stroke-width:2}
.key-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.key-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer}

/* BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600}
.b-disp{background:var(--green-bg);color:var(--green)}
.b-indisp{background:var(--crimson-bg);color:var(--crimson)}

/* MODAL / SHEET */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;pointer-events:none;transition:background .25s}
.backdrop.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;padding:20px}
.backdrop.open .sheet{transform:translateY(0)}

/* FORMS */
.field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input, .field select, .field textarea{padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);font-family:inherit}
.btn-primary{background:var(--red);color:#fff;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btn-admin{background:var(--navy);color:white;margin-top:20px}

/* HISTORICO */
.hist-item{padding:10px;border-bottom:1px solid var(--border);font-size:13px}
.hist-date{color:var(--text3);font-size:11px}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo-box"><span style="color:white;font-weight:bold">ACRC</span></div>
      <div class="header-text">
        <h1>Controle de Chaves</h1>
        <p>ACRC Imóveis — Blumenau / SC</p>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('lista', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Chaves
    </button>
    <button class="tab" onclick="showTab('historico', this)">
      <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Histórico
    </button>
    <button class="tab" onclick="showTab('gerenciar', this)">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Admin
    </button>
  </div>

  <div class="screens">
    <!-- TELA LISTA -->
    <div class="screen active" id="screen-lista">
      <div class="topbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="list-q" placeholder="Buscar chave ou imóvel..." oninput="renderList()">
        </div>
      </div>
      <div class="key-list" id="key-list"></div>
    </div>

    <!-- TELA HISTÓRICO -->
    <div class="screen" id="screen-historico">
        <div style="padding:20px" id="hist-content"></div>
    </div>

    <!-- TELA GERENCIAR (ADM) -->
    <div class="screen" id="screen-gerenciar">
      <div style="padding:20px" id="adm-lock">
        <h3>Acesso Restrito</h3>
        <input type="password" id="adm-pass" placeholder="Senha ADM" style="width:100%; padding:10px; margin:10px 0; border:1px solid var(--border); border-radius:8px;">
        <button class="btn-primary" onclick="unlockAdm()">Entrar</button>
      </div>
      <div style="padding:20px; display:none" id="adm-content">
        <div class="field">
            <label>E-mail de Destino (Automático)</label>
            <input type="email" id="adm-email" placeholder="email@acrc.com.br">
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--border)">
        <h3>Adicionar Chaves</h3>
        <textarea id="bulk-keys" placeholder="Um código por linha" style="width:100%;height:100px;margin:10px 0; padding:10px; border:1px solid var(--border); border-radius:8px;"></textarea>
        <button class="btn-primary" onclick="addKeys()">Importar Chaves</button>
        <button class="btn-primary btn-admin" onclick="localStorage.clear(); location.reload();" style="background:var(--crimson)">Limpar Todo Sistema</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL GERAR PDF / SAÍDA -->
<div class="backdrop" id="modal-pdf" onclick="if(event.target===this)closeSheet('modal-pdf')">
  <div class="sheet">
    <h2 id="pdf-title">Registrar Movimentação</h2>
    
    <div class="field">
      <label>Destinatário</label>
      <select id="pdf-destinatario">
          <option value="Inquilino">Inquilino</option>
          <option value="Proprietário">Proprietário</option>
          <option value="Terceiro/Prestador">Terceiro/Prestador</option>
      </select>
    </div>

    <div class="field">
      <label>Tipo de Saída</label>
      <select id="pdf-saida">
          <option value="Temporária">Temporária</option>
          <option value="Definitiva">Definitiva</option>
      </select>
    </div>

    <div class="field">
      <label>Nome do Responsável</label>
      <input type="text" id="pdf-nome" placeholder="Nome completo">
    </div>

    <div class="field">
      <label>Foto da Chave/Documento (Anexo E-mail)</label>
      <input type="file" id="pdf-foto" accept="image/*" capture="camera">
    </div>

    <div class="field">
      <label>Observações</label>
      <textarea id="pdf-obs"></textarea>
    </div>
    
    <button class="btn-primary" id="btn-salvar" onclick="processarSaida()">Gerar PDF e Notificar</button>
  </div>
</div>

<script>
// Configurações iniciais
emailjs.init("SEU_USER_ID_EMAILJS"); // Opcional: Requer conta no emailjs.com

let keys = JSON.parse(localStorage.getItem('acrc_chaves')) || [];
let history = JSON.parse(localStorage.getItem('acrc_history')) || [];
let currentKey = null;

function showTab(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  btn.classList.add('active');
  if(id === 'historico') renderHistory();
}

function unlockAdm() {
    if(document.getElementById('adm-pass').value === 'acrc2024') {
        document.getElementById('adm-lock').style.display = 'none';
        document.getElementById('adm-content').style.display = 'block';
        document.getElementById('adm-email').value = localStorage.getItem('acrc_adm_email') || '';
    } else {
        alert('Senha incorreta');
    }
}

function addKeys() {
  const input = document.getElementById('bulk-keys').value.split('\n');
  input.forEach(loc => {
    if(loc.trim()) {
      if(!keys.find(k => k.loc === loc.trim())) {
        keys.push({loc: loc.trim(), status: 'DISPONÍVEL', responsavel: '', data: ''});
      }
    }
  });
  save();
  renderList();
  alert('Chaves atualizadas!');
}

function save() {
  localStorage.setItem('acrc_chaves', JSON.stringify(keys));
  localStorage.setItem('acrc_history', JSON.stringify(history));
  localStorage.setItem('acrc_adm_email', document.getElementById('adm-email').value);
}

function renderList() {
  const q = document.getElementById('list-q').value.toLowerCase();
  const list = document.getElementById('key-list');
  list.innerHTML = keys.filter(k => k.loc.toLowerCase().includes(q))
    .sort((a,b) => a.loc.localeCompare(b.loc))
    .map(k => `
    <div class="key-card" onclick="openPDF('${k.loc}')">
      <div><strong>${k.loc}</strong><br><small>${k.responsavel ? 'Com: ' + k.responsavel : 'No local'}</small></div>
      <div style="margin-left:auto" class="badge ${k.status==='DISPONÍVEL'?'b-disp':'b-indisp'}">${k.status}</div>
    </div>
  `).join('');
}

function renderHistory() {
    const container = document.getElementById('hist-content');
    if(history.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text3)">Nenhum histórico registrado.</p>';
        return;
    }
    container.innerHTML = '<h3>Histórico Recente</h3>' + history.map(h => `
        <div class="hist-item">
            <strong>${h.chave}</strong> - ${h.tipo} por ${h.resp}<br>
            <span class="hist-date">${h.data}</span>
        </div>
    `).reverse().join('');
}

function openPDF(loc) {
  currentKey = keys.find(k => k.loc === loc);
  document.getElementById('pdf-title').innerText = "Chave " + loc;
  document.getElementById('modal-pdf').classList.add('open');
}

function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
}

// Converter imagem para Base64 para "anexar"
function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

async function processarSaida() {
  const nome = document.getElementById('pdf-nome').value;
  const dest = document.getElementById('pdf-destinatario').value;
  const tipoSaida = document.getElementById('pdf-saida').value;
  const fotoFile = document.getElementById('pdf-foto').files[0];
  const obs = document.getElementById('pdf-obs').value;
  const emailDestino = localStorage.getItem('acrc_adm_email');
  
  if(!nome) return alert("Digite o nome do responsável!");
  if(!emailDestino) return alert("Configure o e-mail de destino na aba Admin!");

  document.getElementById('btn-salvar').innerText = "Processando...";
  document.getElementById('btn-salvar').disabled = true;

  try {
      let fotoBase64 = "";
      if(fotoFile) fotoBase64 = await getBase64(fotoFile);

      // 1. Gerar PDF
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(20);
      doc.text("ACRC Imóveis - Recibo de Chave", 20, 20);
      doc.setFontSize(12);
      doc.text(`Chave: ${currentKey.loc}`, 20, 40);
      doc.text(`Destinatário: ${dest}`, 20, 50);
      doc.text(`Tipo de Saída: ${tipoSaida}`, 20, 60);
      doc.text(`Responsável: ${nome}`, 20, 70);
      doc.text(`Data: ${new Date().toLocaleString()}`, 20, 80);
      doc.text(`Obs: ${obs}`, 20, 90);
      doc.save(`recibo_${currentKey.loc}.pdf`);

      // 2. Envio Automático simulado (Aqui dispararia para o EmailJS)
      console.log("Enviando e-mail automático para: " + emailDestino);
      // Exemplo de payload para EmailJS:
      // emailjs.send("service_id", "template_id", { to_email: emailDestino, key: currentKey.loc, user: nome, photo: fotoBase64 });

      // 3. Atualizar Status e Histórico
      currentKey.status = 'INDISPONÍVEL';
      currentKey.responsavel = nome;
      history.push({
          chave: currentKey.loc,
          tipo: tipoSaida,
          resp: nome,
          data: new Date().toLocaleString()
      });

      save();
      renderList();
      alert('Registro concluído! E-mail enviado para ' + emailDestino);
      closeSheet('modal-pdf');

  } catch (err) {
      alert("Erro ao processar: " + err);
  } finally {
      document.getElementById('btn-salvar').innerText = "Gerar PDF e Salvar";
      document.getElementById('btn-salvar').disabled = false;
  }
}

function quickSearch() {
  const q = document.getElementById('busca-q').value.toUpperCase();
  const k = keys.find(x => x.loc.toUpperCase() === q);
  const body = document.getElementById('busca-body');
  if(k) {
    body.innerHTML = `
        <div class="key-card" onclick="openPDF('${k.loc}')">
            <div><strong>Chave encontrada: ${k.loc}</strong><br>Status: ${k.status}</div>
        </div>`;
  } else {
    body.innerHTML = "<p style='color:var(--text3)'>Chave não encontrada.</p>";
  }
}

window.onload = renderList;
</script>

</body>
</html>
