<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ACRC Imóveis — Controle de Chaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* AQUI ESTÃO AS VARIÁVEIS E ESTILOS ORIGINAIS DO SEU PROJETO 
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8651A;--red-dark:#c45214;--red-muted:#fdeee5;
  --navy:#1B2E4B;--navy-dark:#142237;--navy-light:#243d61;
  --bg:#f2f2f0;--surface:#fff;--surface2:#f7f7f5;--surface3:#efefec;
  --border:#e4e4e0;--border2:#d0d0cc;
  --text:#191917;--text2:#525250;--text3:#969692;
  --green:#257a35;--green-bg:#e6f4ea;
  --amber:#8a5c08;--amber-bg:#fef3dc;
  --crimson:#a12828;--crimson-bg:#fceaea;
  --blue:#1a56a0;--blue-bg:#e8f0fb;
  --purple:#6b3fa0;--purple-bg:#f0eafa;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-lg:16px;--r-xl:22px;
  --sh:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.07);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.15)}

/* HEADER DESIGN ORIGINAL */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding-top:env(safe-area-inset-top);flex-shrink:0;position:relative;overflow:hidden}
.header-inner{padding:13px 14px;display:flex;align-items:center;gap:11px;position:relative;z-index:2}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.header-text h1{font-size:15px;font-weight:600;color:#fff}
.header-text p{font-size:11px;color:rgba(255,255,255,.65)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 2px 8px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:10.5px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column}
.screen.active{display:flex}

/* ESTILO DOS CARDS DO SEU PROJETO */
.key-list{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.key-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.key-loc{font-family:var(--mono);font-size:13.5px;font-weight:600}
.badge{font-size:10.5px;font-weight:500;padding:3px 8px;border-radius:6px;margin-left:auto}
.b-disp{background:var(--green-bg);color:var(--green)}
.b-indisp{background:var(--crimson-bg);color:var(--crimson)}

/* MODAL SHEET (IGUAL AO SEU PROJETO) */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;pointer-events:none;transition:all .3s}
.backdrop.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;transform:translateY(100%);transition:transform .3s;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.backdrop.open .sheet{transform:translateY(0)}
.btn-primary{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}

/* HISTORICO */
.ha-saida{background:var(--crimson-bg);color:var(--crimson);padding:2px 6px;border-radius:4px;font-size:10px}
.ha-devolucao{background:var(--green-bg);color:var(--green);padding:2px 6px;border-radius:4px;font-size:10px}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3-3.5 3.5z"/></svg>
      </div>
      <div class="header-text">
        <h1>Controle de Chaves</h1>
        <p>ACRC Imóveis — Blumenau / SC</p>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('lista',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Chaves</button>
    <button class="tab" onclick="showTab('historico',this)"><svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/></svg>Histórico</button>
    <button class="tab" onclick="showTab('gerenciar',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Gerenciar</button>
  </div>

  <div class="screens">
    <div class="screen active" id="screen-lista">
      <div style="padding:11px 14px; background:#fff; border-bottom:1px solid var(--border)">
        <input type="search" id="q" placeholder="Buscar por código ou imóvel..." oninput="render()" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--surface2)">
      </div>
      <div id="list-body" class="key-list"></div>
    </div>

    <div class="screen" id="screen-historico">
      <div id="hist-body" class="key-list" style="padding-top:15px"></div>
    </div>

    <div class="screen" id="screen-gerenciar">
      <div style="padding:20px">
        <label style="font-size:12px; font-weight:600; color:var(--text2)">Adicionar Chaves (um código por linha)</label>
        <textarea id="bulk-input" placeholder="A1.1&#10;B2.3" style="width:100%; height:120px; margin-top:8px; padding:12px; border-radius:10px; border:1px solid var(--border); font-family:var(--mono)"></textarea>
        <button class="btn-primary" style="margin-top:12px" onclick="addBulk()">Cadastrar no Sistema</button>
      </div>
    </div>
  </div>
</div>

<div class="backdrop" id="modal-edit" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <h2 id="modal-title" style="font-size:18px; margin-bottom:15px">Editar Chave</h2>
    <div style="display:flex; flex-direction:column; gap:12px">
      <div>
        <label style="font-size:11px; font-weight:600; color:var(--text3)">NOME DO RESPONSÁVEL</label>
        <input type="text" id="edit-resp" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--surface2)">
      </div>
      <div>
        <label style="font-size:11px; font-weight:600; color:var(--text3)">STATUS ATUAL</label>
        <select id="edit-status" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--surface2)">
          <option value="DISPONÍVEL">DISPONÍVEL NO QUADRO</option>
          <option value="INDISPONÍVEL">INDISPONÍVEL (SAÍDA)</option>
        </select>
      </div>
      <button class="btn-primary" style="margin-top:10px" onclick="saveEdit()">Confirmar e Salvar</button>
      <button class="btn-primary" style="background:var(--crimson); margin-top:5px" onclick="deleteKey()">Excluir Chave do Sistema</button>
    </div>
  </div>
</div>

<script>
/* LOGICA DE PROGRAMAÇÃO RESTAURADA E COMPLETA 
*/
let keys = JSON.parse(localStorage.getItem('acrc_v16_data')) || [];
let hist = JSON.parse(localStorage.getItem('acrc_v16_hist')) || [];
let currentIdx = null;

function save() {
  localStorage.setItem('acrc_v16_data', JSON.stringify(keys));
  localStorage.setItem('acrc_v16_hist', JSON.stringify(hist));
  render();
}

function showTab(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  btn.classList.add('active');
  if(id === 'historico') renderHist();
}

function addBulk() {
  const lines = document.getElementById('bulk-input').value.split('\n');
  lines.forEach(l => {
    if(l.trim()) keys.push({ loc: l.trim().toUpperCase(), status: 'DISPONÍVEL', resp: '', date: '' });
  });
  document.getElementById('bulk-input').value = '';
  save();
  showTab('lista', document.querySelectorAll('.tab')[0]);
}

function render() {
  const query = document.getElementById('q').value.toLowerCase();
  const container = document.getElementById('list-body');
  container.innerHTML = '';

  keys.filter(k => k.loc.toLowerCase().includes(query)).forEach((k, i) => {
    const card = document.createElement('div');
    card.className = 'key-card';
    card.onclick = () => openEdit(keys.indexOf(k));
    card.innerHTML = `
      <div class="key-loc">${k.loc}</div>
      <div style="font-size:11px; color:var(--text3)">${k.resp || ''}</div>
      <div class="badge ${k.status === 'DISPONÍVEL' ? 'b-disp' : 'b-indisp'}">${k.status}</div>
    `;
    container.appendChild(card);
  });
}

function renderHist() {
  const container = document.getElementById('hist-body');
  container.innerHTML = hist.map(h => `
    <div class="key-card" style="flex-direction:column; align-items:flex-start; gap:4px">
      <div style="display:flex; width:100%; justify-content:space-between; align-items:center">
        <span style="font-family:var(--mono); font-weight:600">${h.loc}</span>
        <span class="${h.type==='SAÍDA'?'ha-saida':'ha-devolucao'}">${h.type}</span>
      </div>
      <div style="font-size:11px; color:var(--text2)">${h.resp}</div>
      <div style="font-size:10px; color:var(--text3)">${h.time}</div>
    </div>
  `).join('');
}

function openEdit(idx) {
  currentIdx = idx;
  const k = keys[idx];
  document.getElementById('modal-title').innerText = "Chave: " + k.loc;
  document.getElementById('edit-resp').value = k.resp;
  document.getElementById('edit-status').value = k.status;
  document.getElementById('modal-edit').classList.add('open');
}

function closeSheet() {
  document.getElementById('modal-edit').classList.remove('open');
}

function saveEdit() {
  const k = keys[currentIdx];
  const newStatus = document.getElementById('edit-status').value;
  const newResp = document.getElementById('edit-resp').value;

  if (k.status !== newStatus) {
    hist.unshift({
      loc: k.loc,
      resp: newResp || 'Sistema',
      type: newStatus === 'INDISPONÍVEL' ? 'SAÍDA' : 'RETORNO',
      time: new Date().toLocaleString('pt-BR')
    });
    if(newStatus === 'INDISPONÍVEL') gerarPDF(k.loc, newResp);
  }

  k.status = newStatus;
  k.resp = newResp;
  save();
  closeSheet();
}

function deleteKey() {
  if(confirm("Deseja realmente remover esta chave do sistema?")) {
    keys.splice(currentIdx, 1);
    save();
    closeSheet();
  }
}

function gerarPDF(loc, resp) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(22);
  doc.text("ACRC IMÓVEIS - RECIBO", 20, 30);
  doc.setFontSize(14);
  doc.text(`Chave: ${loc}`, 20, 50);
  doc.text(`Responsável: ${resp || 'Não informado'}`, 20, 60);
  doc.text(`Data/Hora: ${new Date().toLocaleString()}`, 20, 70);
  doc.text("__________________________________________", 20, 110);
  doc.text("Assinatura do Responsável", 20, 120);
  doc.save(`Recibo_ACRC_${loc}.pdf`);
}

// Inicialização
render();
</script>
</body>
</html>
